services:
  database:
    image: postgres:15-alpine
    container_name: chabad_forum_db
    environment:
      POSTGRES_DB: chabad_forum
      POSTGRES_USER: forum_user
      POSTGRES_PASSWORD: forum_secret_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum_user -d chabad_forum"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: chabad_forum_backend
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: chabad_forum
      DB_USER: forum_user
      DB_PASSWORD: forum_secret_2024
      JWT_SECRET: chabad_forum_jwt_secret_2024
      CORS_ORIGIN: http://localhost:3001
      NODE_ENV: development
    ports:
      - "5001:5000"
    volumes:
      - ./backend/src:/app/src
    command: npx nodemon src/server.js

  frontend:
    build: ./frontend
    container_name: chabad_forum_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
    ports:
      - "3001:3000"
    volumes:
      - ./frontend/src:/app/src
    command: npm start

volumes:
  postgres_data:
